openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Bright Library API - کتێبخانەی بڕایت
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: books
    description: Book operations
  - name: feedback
    description: Feedback operations
  - name: admin
    description: Admin operations
  - name: Storage
    description: Object storage upload and serving endpoints.

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: User already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /books:
    get:
      operationId: listBooks
      tags: [books]
      summary: List books, optionally filtered by department
      parameters:
        - name: department
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of books
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Book"

    post:
      operationId: createBook
      tags: [books]
      summary: Add a new book (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookBody"
      responses:
        "201":
          description: Book created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "401":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /books/{id}:
    get:
      operationId: getBook
      tags: [books]
      summary: Get a single book by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Book details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "404":
          description: Book not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteBook
      tags: [books]
      summary: Delete a book (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Book deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Book not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /books/{id}/download:
    post:
      operationId: downloadBook
      tags: [books]
      summary: Record a book download and return the PDF URL
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Download URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Book not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /feedback:
    get:
      operationId: listFeedback
      tags: [feedback]
      summary: List all feedback (with optional book filter)
      parameters:
        - name: bookId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of feedback
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Feedback"

    post:
      operationId: createFeedback
      tags: [feedback]
      summary: Submit feedback for a book
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFeedbackBody"
      responses:
        "201":
          description: Feedback submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Feedback"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/downloads:
    get:
      operationId: listDownloads
      tags: [admin]
      summary: List all download events (admin only)
      responses:
        "200":
          description: List of download events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DownloadEvent"
        "401":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/notifications/unread-count:
    get:
      operationId: getUnreadNotificationsCount
      tags: [admin]
      summary: Get count of unread download notifications (admin only)
      responses:
        "200":
          description: Unread notification count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnreadCountResponse"
        "401":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/notifications/mark-all-read:
    post:
      operationId: markAllNotificationsRead
      tags: [admin]
      summary: Mark all download notifications as read (admin only)
      responses:
        "200":
          description: All notifications marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get admin dashboard statistics
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"
        "401":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users:
    get:
      operationId: listUsers
      tags: [admin]
      summary: List all registered users (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "401":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /upload/cover:
    post:
      operationId: uploadCover
      tags: [admin]
      summary: Upload a book cover image (admin only)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                cover:
                  type: string
                  format: binary
              required:
                - cover
      responses:
        "201":
          description: Cover image uploaded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadCoverResponse"
        "400":
          description: Invalid file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/feedback:
    get:
      operationId: listAdminFeedback
      tags: [admin]
      summary: List all feedback across all books (admin only)
      responses:
        "200":
          description: List of all feedback with user and book metadata
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminFeedbackItem"
        "401":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    RegisterBody:
      type: object
      properties:
        name:
          type: string
        username:
          type: string
        password:
          type: string
        department:
          type: string
        badgeCode:
          type: string
      required:
        - name
        - username
        - password
        - department
        - badgeCode

    LoginBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - user

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        username:
          type: string
        department:
          type: string
        badgeCode:
          type: string
        role:
          type: string
          enum: [student, admin]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - username
        - department
        - badgeCode
        - role
        - createdAt

    Book:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        author:
          type: string
        description:
          type: string
        department:
          type: string
        pdfUrl:
          type: string
        coverImage:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        downloadCount:
          type: integer
      required:
        - id
        - title
        - author
        - description
        - department
        - pdfUrl
        - createdAt
        - downloadCount

    CreateBookBody:
      type: object
      properties:
        title:
          type: string
        author:
          type: string
        description:
          type: string
        department:
          type: string
        pdfUrl:
          type: string
        coverImage:
          type: string
          nullable: true
      required:
        - title
        - author
        - description
        - department
        - pdfUrl

    UploadCoverResponse:
      type: object
      properties:
        url:
          type: string
      required:
        - url

    DownloadResponse:
      type: object
      properties:
        pdfUrl:
          type: string
        book:
          $ref: "#/components/schemas/Book"
      required:
        - pdfUrl
        - book

    Feedback:
      type: object
      properties:
        id:
          type: integer
        bookId:
          type: integer
        bookTitle:
          type: string
        userId:
          type: integer
        userName:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - bookId
        - bookTitle
        - userId
        - userName
        - content
        - createdAt

    CreateFeedbackBody:
      type: object
      properties:
        bookId:
          type: integer
        content:
          type: string
      required:
        - bookId
        - content

    DownloadEvent:
      type: object
      properties:
        id:
          type: integer
        bookId:
          type: integer
        bookTitle:
          type: string
        userId:
          type: integer
        userName:
          type: string
        userDepartment:
          type: string
        userBadgeCode:
          type: string
        downloadedAt:
          type: string
          format: date-time
        isRead:
          type: boolean
      required:
        - id
        - bookId
        - bookTitle
        - userId
        - userName
        - userDepartment
        - userBadgeCode
        - downloadedAt
        - isRead

    UnreadCountResponse:
      type: object
      properties:
        count:
          type: integer
      required:
        - count

    AdminStats:
      type: object
      properties:
        totalUsers:
          type: integer
        totalBooks:
          type: integer
        totalDownloads:
          type: integer
        totalFeedback:
          type: integer
        booksByDepartment:
          type: array
          items:
            $ref: "#/components/schemas/DepartmentCount"
        recentDownloads:
          type: array
          items:
            $ref: "#/components/schemas/DownloadEvent"
      required:
        - totalUsers
        - totalBooks
        - totalDownloads
        - totalFeedback
        - booksByDepartment
        - recentDownloads

    DepartmentCount:
      type: object
      properties:
        department:
          type: string
        count:
          type: integer
      required:
        - department
        - count

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string

    AdminFeedbackItem:
      type: object
      properties:
        id:
          type: integer
        bookId:
          type: integer
        bookTitle:
          type: string
        bookDepartment:
          type: string
        userId:
          type: integer
        userName:
          type: string
        userDepartment:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - bookId
        - bookTitle
        - bookDepartment
        - userId
        - userName
        - userDepartment
        - content
        - createdAt
